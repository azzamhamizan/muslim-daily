<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1E7F4B" />
  <title>Al-Qur'an — Muslim Daily</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/shared.css" />
  <style>
    /* ---- Quran Page Specific ---- */
    body { background: var(--bg); }

    /* Surah List View */
    .search-wrap { padding: .5rem 1.25rem .75rem; }
    .search-input { width: 100%; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: .7rem 1rem .7rem 2.75rem; font-size: .875rem; color: var(--text); outline: none; font-family: inherit; transition: border-color .2s; }
    .search-input:focus { border-color: var(--green-light); }
    .search-icon { position: absolute; left: 2.25rem; top: 50%; transform: translateY(-50%); font-size: 1rem; pointer-events: none; }
    .search-wrap { position: relative; }

    .filter-tabs { display: flex; gap: .4rem; padding: 0 1.25rem .75rem; overflow-x: auto; scrollbar-width: none; }
    .filter-tabs::-webkit-scrollbar { display: none; }
    .filter-tab { white-space: nowrap; font-size: .72rem; font-weight: 600; padding: .35rem .75rem; border-radius: 99px; background: var(--bg-elevated); border: 1px solid var(--border); color: var(--text-muted); transition: all .2s; cursor: pointer; flex-shrink: 0; }
    .filter-tab.active { background: var(--green); border-color: var(--green); color: white; }

    .surah-list { padding: 0 1.25rem; display: flex; flex-direction: column; gap: .5rem; }
    .surah-item { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: .875rem 1rem; display: flex; align-items: center; gap: 1rem; cursor: pointer; transition: all .2s; }
    .surah-item:active { transform: scale(.98); background: var(--bg-elevated); }
    .surah-number { width: 40px; height: 40px; border-radius: 10px; background: linear-gradient(135deg, var(--green-pale), var(--bg-elevated)); border: 1px solid rgba(30,127,75,.3); display: flex; align-items: center; justify-content: center; font-size: .78rem; font-weight: 700; color: var(--green-light); flex-shrink: 0; }
    .surah-info { flex: 1; min-width: 0; }
    .surah-name-latin { font-size: .9rem; font-weight: 600; color: var(--text); }
    .surah-meta { font-size: .72rem; color: var(--text-muted); margin-top: .1rem; }
    .surah-name-arabic { font-family: 'Amiri', serif; font-size: 1.2rem; color: var(--gold-light); flex-shrink: 0; }

    /* Surah Detail View */
    .surah-detail { display: none; }
    .surah-detail.active { display: block; }
    .surah-list-view { display: block; }
    .surah-list-view.hidden { display: none; }

    .surah-header-card { background: linear-gradient(135deg, var(--green-pale), var(--bg-card)); border: 1px solid rgba(201,168,76,.2); border-radius: 20px; margin: .75rem 1.25rem; padding: 1.5rem; text-align: center; position: relative; overflow: hidden; }
    .surah-header-card::before { content: '﷽'; font-family: 'Amiri', serif; font-size: 5rem; position: absolute; top: -10px; left: 50%; transform: translateX(-50%); opacity: .04; color: var(--gold); pointer-events: none; white-space: nowrap; }
    .surah-header-arabic { font-family: 'Amiri', serif; font-size: 2rem; color: var(--gold-light); margin-bottom: .25rem; }
    .surah-header-latin { font-size: 1.1rem; font-weight: 700; color: var(--text); }
    .surah-header-meta { font-size: .78rem; color: var(--text-muted); margin-top: .5rem; }
    .surah-header-meta span { background: var(--bg-elevated); padding: .15rem .5rem; border-radius: 99px; margin: 0 .2rem; }

    .bismillah { text-align: center; padding: 1rem 1.25rem; font-family: 'Amiri', serif; font-size: 1.5rem; color: var(--gold-light); border-bottom: 1px solid var(--border); margin-bottom: .5rem; }

    .ayat-list { padding: .5rem 1.25rem 2rem; display: flex; flex-direction: column; gap: .75rem; }
    .ayat-item { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 1.25rem; }
    .ayat-number-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .ayat-num-badge { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, var(--green), var(--green-light)); display: flex; align-items: center; justify-content: center; font-size: .72rem; font-weight: 700; color: white; }
    .ayat-actions { display: flex; gap: .35rem; }
    .ayat-action-btn { width: 30px; height: 30px; border-radius: 8px; background: var(--bg-elevated); display: flex; align-items: center; justify-content: center; font-size: .85rem; transition: background .2s; }
    .ayat-action-btn:active { background: var(--bg-card2); }
    .ayat-arabic-text { font-family: 'Amiri', serif; font-size: 1.4rem; color: var(--gold-light); text-align: right; line-height: 2.2; direction: rtl; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
    .ayat-terjemahan { font-size: .85rem; color: var(--text-muted); line-height: 1.75; }

    /* Bookmark section */
    .bookmarks-section { padding: .5rem 1.25rem 2rem; }
    .bookmark-item { background: var(--bg-card); border: 1px solid var(--border); border-left: 3px solid var(--gold); border-radius: 12px; padding: .875rem; cursor: pointer; margin-bottom: .5rem; }
    .bookmark-item-surah { font-size: .78rem; font-weight: 700; color: var(--green-light); margin-bottom: .25rem; }
    .bookmark-item-arabic { font-family: 'Amiri', serif; font-size: 1rem; color: var(--gold-light); text-align: right; margin-bottom: .25rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    /* Loading */
    .loading-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 3rem 1.25rem; gap: 1rem; }
    .loading-spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--green-light); border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: .85rem; color: var(--text-muted); }

    /* Error */
    .error-wrap { margin: 1.25rem; background: var(--bg-card); border: 1px solid rgba(248,113,113,.3); border-radius: 16px; padding: 1.5rem; text-align: center; }
    .error-icon { font-size: 2rem; margin-bottom: .5rem; }
    .error-text { font-size: .85rem; color: var(--text-muted); margin-bottom: 1rem; }

    /* Bottom padding */
    .page-scroll { flex: 1; overflow-y: auto; padding-bottom: 1rem; }
  </style>
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="apple-touch-icon" href="icon-192.png" />
</head>
<body>
<div class="app">

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="topbar-left">
      <a href="../index.html" class="icon-btn" style="text-decoration:none;" aria-label="Kembali">←</a>
      <span class="topbar-logo">📗</span>
      <span class="topbar-title">Al-Qur'an</span>
    </div>
    <div class="topbar-right">
      <button id="dark-mode-toggle" class="icon-btn" aria-label="Toggle tema"><span>🌙</span></button>
    </div>
  </header>

  <div class="page-scroll">

    <!-- SURAH LIST VIEW -->
    <div id="surah-list-view" class="surah-list-view">
      <div class="page-header">
        <h2 class="page-title">Al-Qur'an</h2>
        <p class="page-subtitle">القرآن الكريم — 114 Surah</p>
      </div>

      <!-- Search -->
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="surah-search" class="search-input" placeholder="Cari surah..." />
      </div>

      <!-- Filter Tabs -->
      <div class="filter-tabs">
        <button class="filter-tab active" data-filter="all">Semua</button>
        <button class="filter-tab" data-filter="makkiyah">Makkiyah</button>
        <button class="filter-tab" data-filter="madaniyah">Madaniyah</button>
        <button class="filter-tab" data-filter="bookmarks">🔖 Tersimpan</button>
      </div>

      <!-- Surah List -->
      <div id="surah-list" class="surah-list">
        <div class="loading-wrap">
          <div class="loading-spinner"></div>
          <p class="loading-text">Memuat daftar surah...</p>
        </div>
      </div>
    </div>

    <!-- SURAH DETAIL VIEW -->
    <div id="surah-detail-view" class="surah-detail">
      <div class="page-header" style="display:flex;align-items:center;gap:.5rem;padding-bottom:.5rem;">
        <button id="back-to-list" class="icon-btn" aria-label="Kembali ke daftar">←</button>
        <div>
          <h2 class="page-title" id="detail-title">—</h2>
          <p class="page-subtitle" id="detail-meta">—</p>
        </div>
      </div>

      <!-- Surah Header -->
      <div class="surah-header-card">
        <div class="surah-header-arabic" id="detail-arabic">—</div>
        <div class="surah-header-latin" id="detail-latin">—</div>
        <div class="surah-header-meta" id="detail-info">—</div>
      </div>

      <!-- Bismillah (hidden for At-Taubah & Al-Fatihah) -->
      <div class="bismillah" id="detail-bismillah">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>

      <!-- Ayat List -->
      <div id="ayat-list" class="ayat-list">
        <div class="loading-wrap">
          <div class="loading-spinner"></div>
          <p class="loading-text">Memuat ayat...</p>
        </div>
      </div>
    </div>

  </div><!-- /page-scroll -->
</div><!-- /app -->

<div id="toast" class="toast" aria-live="polite"></div>
<script src="../js/shared.js"></script>
<script>
'use strict';

// ---- State ----
const qState = {
  surahList: [],
  currentSurah: null,
  filter: 'all',
  search: '',
  bookmarks: JSON.parse(localStorage.getItem('md-quran-bookmarks') || '[]'),
  lastRead: JSON.parse(localStorage.getItem('md-quran-lastread') || 'null')
};

// ---- Init ----
document.addEventListener('DOMContentLoaded', () => {
  initTheme();
  loadSurahList();
  setupEvents();
});

// ---- Load Surah List from API ----
async function loadSurahList() {
  try {
    const res = await fetch('https://equran.id/api/v2/surat');
    const data = await res.json();
    if (data.code === 200) {
      qState.surahList = data.data;
      renderSurahList();
    } else throw new Error('API error');
  } catch (err) {
    document.getElementById('surah-list').innerHTML = `
      <div class="error-wrap">
        <div class="error-icon">⚠️</div>
        <p class="error-text">Gagal memuat daftar surah. Periksa koneksi internet.</p>
        <button class="btn-primary" onclick="loadSurahList()">Coba Lagi</button>
      </div>`;
  }
}

// ---- Render Surah List ----
function renderSurahList() {
  const { surahList, filter, search, bookmarks } = qState;
  let list = surahList;

  if (filter === 'makkiyah') list = list.filter(s => s.tempatTurun === 'Makkah');
  else if (filter === 'madaniyah') list = list.filter(s => s.tempatTurun === 'Madinah');
  else if (filter === 'bookmarks') {
    const bkNums = bookmarks.map(b => b.surahNum);
    list = list.filter(s => bkNums.includes(s.nomor));
  }

  if (search.trim()) {
    const q = search.toLowerCase();
    list = list.filter(s =>
      s.namaLatin.toLowerCase().includes(q) ||
      s.nama.includes(q) ||
      s.arti.toLowerCase().includes(q) ||
      String(s.nomor).includes(q)
    );
  }

  const container = document.getElementById('surah-list');
  if (!list.length) {
    container.innerHTML = `<div class="loading-wrap"><p class="loading-text">Tidak ada surah ditemukan.</p></div>`;
    return;
  }
  container.innerHTML = list.map(s => `
    <div class="surah-item" data-num="${s.nomor}">
      <div class="surah-number">${s.nomor}</div>
      <div class="surah-info">
        <div class="surah-name-latin">${s.namaLatin} <span style="font-size:.72rem;color:var(--text-muted);">— ${s.arti}</span></div>
        <div class="surah-meta">${s.jumlahAyat} ayat · ${s.tempatTurun}</div>
      </div>
      <div class="surah-name-arabic">${s.nama}</div>
    </div>
  `).join('');

  container.querySelectorAll('.surah-item').forEach(el => {
    el.addEventListener('click', () => openSurah(parseInt(el.dataset.num)));
  });
}

// ---- Open Surah ----
async function openSurah(num) {
  showDetail(true);
  document.getElementById('ayat-list').innerHTML = `<div class="loading-wrap"><div class="loading-spinner"></div><p class="loading-text">Memuat surah...</p></div>`;

  try {
    const res = await fetch(`https://equran.id/api/v2/surat/${num}`);
    const data = await res.json();
    if (data.code !== 200) throw new Error('API error');

    const surah = data.data;
    qState.currentSurah = surah;

    // Header
    document.getElementById('detail-title').textContent = `${surah.nomor}. ${surah.namaLatin}`;
    document.getElementById('detail-meta').textContent = `${surah.jumlahAyat} ayat · ${surah.tempatTurun}`;
    document.getElementById('detail-arabic').textContent = surah.nama;
    document.getElementById('detail-latin').textContent = surah.namaLatin;
    document.getElementById('detail-info').innerHTML = `<span>${surah.arti}</span><span>${surah.tempatTurun}</span>`;

    // Bismillah: hide for At-Taubah (9) and Al-Fatihah (1 shows it within ayat)
    const bismillah = document.getElementById('detail-bismillah');
    bismillah.style.display = (num === 9 || num === 1) ? 'none' : 'block';

    // Save last read
    localStorage.setItem('md-quran-lastread', JSON.stringify({ num, name: surah.namaLatin }));

    // Render ayat
    renderAyatList(surah.ayat, num);
  } catch (err) {
    document.getElementById('ayat-list').innerHTML = `<div class="error-wrap"><div class="error-icon">⚠️</div><p class="error-text">Gagal memuat surah. Periksa koneksi.</p><button class="btn-primary" onclick="openSurah(${num})">Coba Lagi</button></div>`;
  }
}

function renderAyatList(ayatArr, surahNum) {
  const bookmarks = qState.bookmarks;
  document.getElementById('ayat-list').innerHTML = ayatArr.map((a, i) => {
    const isBm = bookmarks.some(b => b.surahNum === surahNum && b.ayatNum === a.nomorAyat);
    return `
      <div class="ayat-item" id="ayat-${a.nomorAyat}">
        <div class="ayat-number-row">
          <div class="ayat-num-badge">${a.nomorAyat}</div>
          <div class="ayat-actions">
            <button class="ayat-action-btn bm-btn" data-num="${a.nomorAyat}" title="Bookmark">${isBm ? '⭐' : '🔖'}</button>
            <button class="ayat-action-btn share-btn" data-num="${a.nomorAyat}" title="Salin">📋</button>
          </div>
        </div>
        <div class="ayat-arabic-text">${a.teksArab}</div>
        <div class="ayat-terjemahan">${a.teksIndonesia}</div>
      </div>`;
  }).join('');

  // Bookmark buttons
  document.querySelectorAll('.bm-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleAyatBookmark(surahNum, parseInt(btn.dataset.num));
    });
  });

  // Copy buttons
  document.querySelectorAll('.share-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const ayatNum = parseInt(btn.dataset.num);
      const ayat = qState.currentSurah.ayat.find(a => a.nomorAyat === ayatNum);
      if (ayat) {
        navigator.clipboard?.writeText(`${ayat.teksArab}\n\n${ayat.teksIndonesia}\n\n(${qState.currentSurah.namaLatin} : ${ayatNum})`);
        showToast('Ayat disalin 📋');
      }
    });
  });
}

function toggleAyatBookmark(surahNum, ayatNum) {
  const bms = qState.bookmarks;
  const idx = bms.findIndex(b => b.surahNum === surahNum && b.ayatNum === ayatNum);
  const surahName = qState.currentSurah?.namaLatin || '';
  if (idx === -1) {
    const ayat = qState.currentSurah?.ayat.find(a => a.nomorAyat === ayatNum);
    if (ayat) bms.push({ surahNum, surahName, ayatNum, arabic: ayat.teksArab });
    showToast('Ayat disimpan ⭐');
  } else {
    bms.splice(idx, 1);
    showToast('Bookmark dihapus');
  }
  qState.bookmarks = bms;
  localStorage.setItem('md-quran-bookmarks', JSON.stringify(bms));
  if (qState.currentSurah) renderAyatList(qState.currentSurah.ayat, surahNum);
}

// ---- Toggle Views ----
function showDetail(show) {
  document.getElementById('surah-list-view').classList.toggle('hidden', show);
  document.getElementById('surah-detail-view').classList.toggle('active', show);
  if (!show) document.getElementById('surah-detail-view').classList.remove('active');
}

// ---- Setup Events ----
function setupEvents() {
  document.getElementById('back-to-list').addEventListener('click', () => showDetail(false));

  document.getElementById('surah-search').addEventListener('input', (e) => {
    qState.search = e.target.value;
    renderSurahList();
  });

  document.querySelectorAll('.filter-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      qState.filter = btn.dataset.filter;
      renderSurahList();
    });
  });
}
</script>
</body>
</html>
