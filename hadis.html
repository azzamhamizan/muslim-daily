<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1E7F4B" />
  <title>Hadis Harian — Muslim Daily</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/shared.css" />
  <style>
    .page-scroll { flex: 1; overflow-y: auto; padding-bottom: 1rem; }

    .hadis-featured { margin: .75rem 1.25rem; background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 1.5rem; }
    .hadis-number { font-size: .75rem; color: var(--text-dim); margin-bottom: .75rem; font-weight: 600; }
    .hadis-arabic { font-family: 'Amiri', serif; font-size: 1.3rem; color: var(--gold-light); text-align: right; line-height: 2; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); direction: rtl; }
    .hadis-text { font-size: .875rem; color: var(--text); line-height: 1.8; margin-bottom: 1rem; }
    .hadis-meta { display: flex; align-items: center; justify-content: space-between; padding-top: .75rem; border-top: 1px solid var(--border); margin-bottom: 1rem; }
    .hadis-source { font-size: .8rem; color: var(--green-light); font-weight: 600; }
    .bookmark-btn { font-size: 1.2rem; transition: transform .2s; }
    .bookmark-btn:active { transform: scale(1.3); }
    .bookmark-btn.bookmarked { filter: sepia(1) saturate(3) hue-rotate(10deg); }
    .hadis-nav { display: flex; gap: .5rem; }
    .hadis-nav button { flex: 1; }

    /* Bookmarks */
    .bookmarks-section { padding: 0 1.25rem 2rem; }
    .bookmarks-section h3 { font-size: 1rem; font-weight: 600; margin-bottom: .75rem; }
    .bookmark-item { background: var(--bg-card); border: 1px solid var(--border); border-left: 3px solid var(--gold); border-radius: 12px; padding: .875rem; cursor: pointer; margin-bottom: .5rem; transition: all .2s; }
    .bookmark-item:active { transform: scale(.98); }
    .bm-text { font-size: .8rem; color: var(--text); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: .25rem; }
    .bm-source { font-size: .7rem; color: var(--green-light); font-weight: 600; }
    .empty-bm { text-align: center; color: var(--text-dim); font-size: .85rem; padding: 1.5rem 0; }
  </style>
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="apple-touch-icon" href="icon-192.png" />
</head>
<body>
<div class="app">

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="topbar-left">
      <a href="../index.html" class="icon-btn" style="text-decoration:none;" aria-label="Kembali">←</a>
      <span class="topbar-logo">💬</span>
      <span class="topbar-title">Hadis Harian</span>
    </div>
    <div class="topbar-right">
      <button id="dark-mode-toggle" class="icon-btn" aria-label="Toggle tema"><span>🌙</span></button>
    </div>
  </header>

  <div class="page-scroll">
    <div class="page-header">
      <h2 class="page-title">Hadis Harian</h2>
      <p class="page-subtitle">Hadis pilihan setiap hari</p>
    </div>

    <!-- Featured Hadis -->
    <div class="hadis-featured">
      <div class="hadis-number" id="hadis-num">#1</div>
      <p class="hadis-arabic" id="hadis-arabic"></p>
      <p class="hadis-text" id="hadis-text">Memuat...</p>
      <div class="hadis-meta">
        <span class="hadis-source" id="hadis-source">—</span>
        <button class="bookmark-btn" id="hadis-bookmark" aria-label="Bookmark">🔖</button>
      </div>
      <div class="hadis-nav">
        <button class="btn-secondary" id="hadis-prev">← Sebelumnya</button>
        <button class="btn-secondary" id="hadis-next">Berikutnya →</button>
      </div>
    </div>

    <!-- Bookmarks -->
    <div class="bookmarks-section" id="bm-section">
      <h3>🔖 Hadis Tersimpan</h3>
      <div id="bm-list"></div>
    </div>

  </div>
</div>

<div id="toast" class="toast" aria-live="polite"></div>
<script src="../js/shared.js"></script>
<script>
'use strict';

const HADITHS = [
  { id:1, arabic:"إِنَّمَا الْأَعْمَالُ بِالنِّيَّاتِ", text:"Sesungguhnya setiap amalan tergantung pada niatnya. Dan setiap orang akan mendapatkan apa yang ia niatkan.", source:"HR. Bukhari & Muslim" },
  { id:2, arabic:"الْمُسْلِمُ مَنْ سَلِمَ الْمُسْلِمُونَ مِنْ لِسَانِهِ وَيَدِهِ", text:"Muslim yang baik adalah yang orang-orang muslim lainnya selamat dari gangguan lisan dan tangannya.", source:"HR. Bukhari" },
  { id:3, arabic:"الدِّينُ النَّصِيحَةُ", text:"Agama itu adalah nasihat.", source:"HR. Muslim" },
  { id:4, arabic:"خَيْرُكُمْ مَنْ تَعَلَّمَ الْقُرْآنَ وَعَلَّمَهُ", text:"Sebaik-baik kalian adalah orang yang belajar Al-Quran dan mengajarkannya.", source:"HR. Bukhari" },
  { id:5, arabic:"مَنْ كَانَ يُؤْمِنُ بِاللَّهِ وَالْيَوْمِ الآخِرِ فَلْيَقُلْ خَيْرًا أَوْ لِيَصْمُتْ", text:"Barangsiapa yang beriman kepada Allah dan hari akhir, hendaklah ia berkata baik atau diam.", source:"HR. Bukhari & Muslim" },
  { id:6, arabic:"لَا يُؤْمِنُ أَحَدُكُمْ حَتَّى يُحِبَّ لِأَخِيهِ مَا يُحِبُّ لِنَفْسِهِ", text:"Tidaklah beriman seseorang sampai ia mencintai saudaranya seperti ia mencintai dirinya sendiri.", source:"HR. Bukhari & Muslim" },
  { id:7, arabic:"الطَّهُورُ شَطْرُ الْإِيمَانِ", text:"Bersuci adalah separuh dari keimanan.", source:"HR. Muslim" },
  { id:8, arabic:"أَفْضَلُ الصِّيَامِ بَعْدَ رَمَضَانَ شَهْرُ اللَّهِ الْمُحَرَّمُ", text:"Puasa yang paling utama setelah Ramadan adalah puasa di bulan Muharram.", source:"HR. Muslim" },
  { id:9, arabic:"اتَّقِ اللَّهَ حَيْثُمَا كُنْتَ", text:"Bertakwalah kepada Allah di mana pun kamu berada, ikutilah keburukan dengan kebaikan niscaya kebaikan itu akan menghapusnya.", source:"HR. Tirmidzi" },
  { id:10, arabic:"الْمُؤْمِنُ الْقَوِيُّ خَيْرٌ وَأَحَبُّ إِلَى اللَّهِ مِنَ الْمُؤْمِنِ الضَّعِيفِ", text:"Mukmin yang kuat lebih baik dan lebih dicintai Allah daripada mukmin yang lemah.", source:"HR. Muslim" },
  { id:11, arabic:"مَنْ سَلَكَ طَرِيقًا يَلْتَمِسُ فِيهِ عِلْمًا سَهَّلَ اللَّهُ لَهُ طَرِيقًا إِلَى الْجَنَّةِ", text:"Barangsiapa menempuh jalan untuk mencari ilmu, maka Allah akan memudahkan baginya jalan menuju surga.", source:"HR. Muslim" },
  { id:12, arabic:"إِنَّ الْحَلَالَ بَيِّنٌ وَإِنَّ الْحَرَامَ بَيِّنٌ", text:"Sesungguhnya yang halal itu jelas dan yang haram pun jelas.", source:"HR. Bukhari & Muslim" },
  { id:13, arabic:"كُلُّ مَعْرُوفٍ صَدَقَةٌ", text:"Setiap kebaikan adalah sedekah.", source:"HR. Bukhari" },
  { id:14, arabic:"ارْحَمُوا مَنْ فِي الْأَرْضِ يَرْحَمُكُمْ مَنْ فِي السَّمَاءِ", text:"Sayangilah mereka yang ada di bumi, niscaya Dia yang ada di langit akan menyayangi kalian.", source:"HR. Abu Dawud & Tirmidzi" },
  { id:15, arabic:"الصَّلَاةُ عِمَادُ الدِّينِ", text:"Sholat adalah tiang agama.", source:"HR. Baihaqi" },
  { id:16, arabic:"أَحَبُّ الْأَعْمَالِ إِلَى اللَّهِ أَدْوَمُهَا وَإِنْ قَلَّ", text:"Amalan yang paling dicintai Allah adalah yang paling rutin dilakukan meskipun sedikit.", source:"HR. Bukhari & Muslim" },
  { id:17, arabic:"تَبَسُّمُكَ فِي وَجْهِ أَخِيكَ صَدَقَةٌ", text:"Senyummu kepada saudaramu adalah sedekah.", source:"HR. Tirmidzi" },
  { id:18, arabic:"الْكَلِمَةُ الطَّيِّبَةُ صَدَقَةٌ", text:"Ucapan yang baik adalah sedekah.", source:"HR. Bukhari & Muslim" },
  { id:19, arabic:"إِنَّ اللَّهَ رَفِيقٌ يُحِبُّ الرِّفْقَ", text:"Sesungguhnya Allah itu Maha Lembut, Dia mencintai kelembutan dalam segala urusan.", source:"HR. Bukhari & Muslim" },
  { id:20, arabic:"خَيْرُ الناس أنفعهم للناس", text:"Sebaik-baik manusia adalah yang paling bermanfaat bagi manusia lainnya.", source:"HR. Ahmad" },
  { id:21, arabic:"الْيَدُ الْعُلْيَا خَيْرٌ مِنَ الْيَدِ السُّفْلَى", text:"Tangan di atas lebih baik daripada tangan di bawah (memberi lebih baik daripada meminta).", source:"HR. Bukhari & Muslim" },
  { id:22, arabic:"لَيْسَ الشَّدِيدُ بِالصُّرَعَةِ", text:"Orang kuat bukanlah orang yang pandai bergulat, tetapi orang yang dapat menahan dirinya ketika marah.", source:"HR. Bukhari & Muslim" },
  { id:23, arabic:"النَّدَمُ تَوْبَةٌ", text:"Penyesalan adalah taubat.", source:"HR. Ibnu Majah" },
  { id:24, arabic:"مَنْ أَحَبَّ لِقَاءَ اللَّهِ أَحَبَّ اللَّهُ لِقَاءَهُ", text:"Barangsiapa yang rindu bertemu Allah, Allah pun rindu bertemu dengannya.", source:"HR. Bukhari" },
  { id:25, arabic:"أَعِنِّي عَلَى نَفْسِكَ بِكَثْرَةِ السُّجُودِ", text:"Bantulah aku untuk mendekatkan dirimu dengan memperbanyak sujud.", source:"HR. Muslim" }
];

let hState = {
  current: getDayOfYear() % HADITHS.length,
  bookmarks: JSON.parse(localStorage.getItem('md-hadis-bookmarks') || '[]')
};

document.addEventListener('DOMContentLoaded', () => {
  initTheme();
  renderHadis();
  $('hadis-prev').addEventListener('click', () => { hState.current = (hState.current - 1 + HADITHS.length) % HADITHS.length; renderHadis(); });
  $('hadis-next').addEventListener('click', () => { hState.current = (hState.current + 1) % HADITHS.length; renderHadis(); });
  $('hadis-bookmark').addEventListener('click', toggleBookmark);
});

function renderHadis() {
  const h = HADITHS[hState.current];
  $('hadis-num').textContent = `#${h.id}`;
  $('hadis-arabic').textContent = h.arabic;
  $('hadis-text').textContent = h.text;
  $('hadis-source').textContent = h.source;
  const isBm = hState.bookmarks.some(b => b.id === h.id);
  const btn = $('hadis-bookmark');
  btn.classList.toggle('bookmarked', isBm);
  btn.textContent = isBm ? '⭐' : '🔖';
  renderBookmarks();
}

function toggleBookmark() {
  const h = HADITHS[hState.current];
  const idx = hState.bookmarks.findIndex(b => b.id === h.id);
  if (idx === -1) { hState.bookmarks.push(h); showToast('Hadis disimpan ⭐'); }
  else { hState.bookmarks.splice(idx, 1); showToast('Bookmark dihapus'); }
  localStorage.setItem('md-hadis-bookmarks', JSON.stringify(hState.bookmarks));
  renderHadis();
}

function renderBookmarks() {
  const sec = $('bm-section');
  const list = $('bm-list');
  if (!hState.bookmarks.length) { list.innerHTML = '<div class="empty-bm">Belum ada hadis tersimpan 🔖</div>'; return; }
  list.innerHTML = hState.bookmarks.map(h => `
    <div class="bookmark-item" data-id="${h.id}">
      <div class="bm-text">${h.text}</div>
      <div class="bm-source">${h.source}</div>
    </div>`).join('');
  list.querySelectorAll('.bookmark-item').forEach(el => {
    el.addEventListener('click', () => {
      const idx = HADITHS.findIndex(h => h.id === parseInt(el.dataset.id));
      if (idx !== -1) { hState.current = idx; renderHadis(); window.scrollTo(0, 0); }
    });
  });
}
</script>
</body>
</html>
