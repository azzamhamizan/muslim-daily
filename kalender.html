<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1E7F4B" />
  <title>Kalender Islam — Muslim Daily</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/shared.css" />
  <style>
    .page-scroll { flex: 1; overflow-y: auto; padding-bottom: 1rem; }

    /* Today card */
    .today-card { margin: .75rem 1.25rem; background: linear-gradient(135deg, #1a3d28, var(--bg-card)); border: 1px solid rgba(30,127,75,.3); border-radius: 20px; padding: 1.5rem; position: relative; overflow: hidden; }
    .today-card::after { content: '☪'; position: absolute; right: -10px; bottom: -10px; font-size: 6rem; opacity: .04; color: var(--green-light); }
    [data-theme="light"] .today-card { background: linear-gradient(135deg, rgba(30,127,75,.08), white); }
    .today-label { font-size: .72rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .25rem; font-weight: 600; }
    .today-hijri-date { font-family: 'Amiri', serif; font-size: 2rem; color: var(--gold-light); font-weight: 700; }
    .today-hijri-month { font-size: 1rem; color: var(--green-light); font-weight: 600; margin-bottom: .5rem; }
    .today-masehi { font-size: .85rem; color: var(--text-muted); padding-top: .75rem; border-top: 1px solid var(--border); }

    /* Events */
    .events-section { padding: 0 1.25rem; }
    .events-section h3 { font-size: 1rem; font-weight: 600; margin-bottom: .75rem; margin-top: .5rem; }
    .event-item { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: .875rem 1rem; display: flex; align-items: center; gap: .875rem; margin-bottom: .5rem; }
    .event-item.today { border-color: rgba(39,162,97,.4); border-left: 3px solid var(--green-light); }
    .event-item.upcoming { border-left: 3px solid var(--gold); }
    .event-item.past { opacity: .4; }
    .event-icon { font-size: 1.4rem; flex-shrink: 0; }
    .event-info { flex: 1; min-width: 0; }
    .event-name { font-size: .875rem; font-weight: 600; }
    .event-masehi { font-size: .75rem; color: var(--text-muted); margin-top: .1rem; }
    .event-hijri { font-family: 'Amiri', serif; font-size: .8rem; color: var(--gold); margin-top: .1rem; }
    .event-countdown { font-size: .7rem; font-weight: 700; color: var(--gold-light); background: rgba(201,168,76,.1); padding: .2rem .5rem; border-radius: 99px; white-space: nowrap; flex-shrink: 0; }
    .event-countdown.today { color: var(--green-light); background: rgba(30,127,75,.12); }

    /* Hijri months reference */
    .months-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .5rem; padding: 0 1.25rem 2rem; }
    .month-item { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: .75rem; display: flex; align-items: center; gap: .75rem; }
    .month-num { width: 28px; height: 28px; border-radius: 8px; background: var(--bg-elevated); display: flex; align-items: center; justify-content: center; font-size: .72rem; font-weight: 700; color: var(--green-light); flex-shrink: 0; }
    .month-name { font-size: .82rem; font-weight: 600; }
    .month-arabic { font-family: 'Amiri', serif; font-size: .95rem; color: var(--gold-light); display: block; }
  </style>
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="apple-touch-icon" href="icon-192.png" />
</head>
<body>
<div class="app">

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="topbar-left">
      <a href="../index.html" class="icon-btn" style="text-decoration:none;" aria-label="Kembali">←</a>
      <span class="topbar-logo">📅</span>
      <span class="topbar-title">Kalender Islam</span>
    </div>
    <div class="topbar-right">
      <button id="dark-mode-toggle" class="icon-btn" aria-label="Toggle tema"><span>🌙</span></button>
    </div>
  </header>

  <div class="page-scroll">
    <div class="page-header">
      <h2 class="page-title">Kalender Islam</h2>
      <p class="page-subtitle">Tanggal Hijriyah & Event Islam 1447 H</p>
    </div>

    <!-- Today -->
    <div class="today-card">
      <div class="today-label">Tanggal Hijriyah Hari Ini</div>
      <div class="today-hijri-date" id="today-hijri-date">—</div>
      <div class="today-hijri-month" id="today-hijri-month">Memuat...</div>
      <div class="today-masehi" id="today-masehi">—</div>
    </div>

    <!-- Events -->
    <div class="events-section">
      <h3>🌙 Event Islam 1447 H</h3>
      <div id="events-list"></div>
    </div>

    <!-- Hijri Months -->
    <div class="events-section" style="margin-top:.5rem;">
      <h3>📖 Bulan-bulan Hijriyah</h3>
    </div>
    <div class="months-grid" id="months-grid"></div>

  </div>
</div>

<div id="toast" class="toast" aria-live="polite"></div>
<script src="../js/shared.js"></script>
<script>
'use strict';

const EVENTS = [
  { name: "Tahun Baru Islam (1 Muharram)", icon: "🌙", date: "2025-07-27", hijri: "1 Muharram 1447 H" },
  { name: "Maulid Nabi Muhammad SAW", icon: "🌹", date: "2025-09-05", hijri: "12 Rabiul Awal 1447 H" },
  { name: "Isra Mi'raj", icon: "✨", date: "2026-01-28", hijri: "27 Rajab 1447 H" },
  { name: "Nisfu Sya'ban", icon: "⭐", date: "2026-03-04", hijri: "15 Sya'ban 1447 H" },
  { name: "Ramadan 1447 H", icon: "🌙", date: "2026-02-19", hijri: "1 Ramadan 1447 H" },
  { name: "Lailatul Qadar", icon: "💫", date: "2026-04-14", hijri: "27 Ramadan 1447 H" },
  { name: "Idul Fitri 1447 H", icon: "🎊", date: "2026-04-18", hijri: "1 Syawal 1447 H" },
  { name: "Puasa Dzulhijjah", icon: "📿", date: "2026-06-18", hijri: "1 Dzulhijjah 1447 H" },
  { name: "Hari Arafah", icon: "🕌", date: "2026-06-27", hijri: "9 Dzulhijjah 1447 H" },
  { name: "Idul Adha 1447 H", icon: "🐑", date: "2026-06-28", hijri: "10 Dzulhijjah 1447 H" }
];

const HIJRI_MONTHS = [
  { num: 1, name: 'Muharram', arabic: 'مُحَرَّم' },
  { num: 2, name: 'Safar', arabic: 'صَفَر' },
  { num: 3, name: "Rabiul Awal", arabic: 'رَبِيعُ الْأَوَّل' },
  { num: 4, name: "Rabiul Akhir", arabic: 'رَبِيعُ الْآخِر' },
  { num: 5, name: "Jumadil Awal", arabic: 'جُمَادَى الْأُولَى' },
  { num: 6, name: "Jumadil Akhir", arabic: 'جُمَادَى الْآخِرَة' },
  { num: 7, name: 'Rajab', arabic: 'رَجَب' },
  { num: 8, name: "Sya'ban", arabic: 'شَعْبَان' },
  { num: 9, name: 'Ramadan', arabic: 'رَمَضَان' },
  { num: 10, name: 'Syawal', arabic: 'شَوَّال' },
  { num: 11, name: "Dzulqa'dah", arabic: 'ذُو الْقَعْدَة' },
  { num: 12, name: 'Dzulhijjah', arabic: 'ذُو الْحِجَّة' }
];

document.addEventListener('DOMContentLoaded', () => {
  initTheme();
  loadTodayHijri();
  renderEvents();
  renderMonths();
});

async function loadTodayHijri() {
  // Try from cache first
  try {
    const cached = JSON.parse(localStorage.getItem('md-prayer-cache') || 'null');
    if (cached && cached.date === todayDateStr() && cached.hijriStr) {
      $('today-hijri-date').textContent = cached.kalHijriDate || cached.hijriStr.split(' ').slice(0, 2).join(' ');
      $('today-hijri-month').textContent = cached.kalHijriMonth || cached.hijriStr.split(' ').slice(2).join(' ');
    }
  } catch {}

  // Always show masehi
  const now = new Date();
  $('today-masehi').textContent = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

  // Try to fetch from API
  try {
    const ts = Math.floor(Date.now() / 1000);
    const res = await fetch(`https://api.aladhan.com/v1/gToH?date=${now.getDate()}-${now.getMonth() + 1}-${now.getFullYear()}`);
    const data = await res.json();
    if (data.code === 200) {
      const h = data.data.hijri;
      $('today-hijri-date').textContent = `${h.day} ${h.month.ar}`;
      $('today-hijri-month').textContent = `${h.month.en} ${h.year} H`;
    }
  } catch {}
}

function renderEvents() {
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const list = $('events-list');
  list.innerHTML = EVENTS.map(e => {
    const d = new Date(e.date);
    const diff = Math.ceil((d - today) / 86400000);
    const cls = diff === 0 ? 'today' : diff > 0 ? 'upcoming' : 'past';
    const badge = diff === 0 ? 'Hari Ini' : diff > 0 ? `${diff} hari lagi` : `${Math.abs(diff)} hari lalu`;
    const badgeCls = diff === 0 ? 'today' : '';
    return `<div class="event-item ${cls}">
      <span class="event-icon">${e.icon}</span>
      <div class="event-info">
        <div class="event-name">${e.name}</div>
        <div class="event-masehi">${d.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' })}</div>
        <div class="event-hijri">${e.hijri}</div>
      </div>
      <span class="event-countdown ${badgeCls}">${badge}</span>
    </div>`;
  }).join('');
}

function renderMonths() {
  $('months-grid').innerHTML = HIJRI_MONTHS.map(m => `
    <div class="month-item">
      <div class="month-num">${m.num}</div>
      <div>
        <div class="month-name">${m.name}</div>
        <span class="month-arabic">${m.arabic}</span>
      </div>
    </div>`).join('');
}
</script>
</body>
</html>
