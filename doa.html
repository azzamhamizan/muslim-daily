<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1E7F4B" />
  <title>Doa Harian — Muslim Daily</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/shared.css" />
  <style>
    .page-scroll { flex: 1; overflow-y: auto; padding-bottom: 1rem; }

    .search-wrap { position: relative; padding: .25rem 1.25rem .75rem; }
    .search-input { width: 100%; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: .7rem 1rem .7rem 2.75rem; font-size: .875rem; color: var(--text); outline: none; font-family: inherit; transition: border-color .2s; }
    .search-input:focus { border-color: var(--green-light); }
    .search-icon { position: absolute; left: 2.25rem; top: 50%; transform: translateY(-50%); font-size: 1rem; pointer-events: none; }

    .category-tabs { display: flex; gap: .4rem; padding: 0 1.25rem .75rem; overflow-x: auto; scrollbar-width: none; }
    .category-tabs::-webkit-scrollbar { display: none; }
    .cat-btn { white-space: nowrap; font-size: .72rem; font-weight: 600; padding: .35rem .75rem; border-radius: 99px; background: var(--bg-elevated); border: 1px solid var(--border); color: var(--text-muted); cursor: pointer; transition: all .2s; flex-shrink: 0; }
    .cat-btn.active { background: var(--green); border-color: var(--green); color: white; }

    .doa-list { padding: 0 1.25rem 2rem; display: flex; flex-direction: column; gap: .75rem; }
    .doa-item { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 1rem; cursor: pointer; transition: all .2s; }
    .doa-item.expanded { border-color: rgba(30,127,75,.3); }
    .doa-item-header { display: flex; align-items: center; justify-content: space-between; gap: .75rem; }
    .doa-item-title { font-size: .9rem; font-weight: 600; flex: 1; }
    .doa-item-waktu { font-size: .65rem; font-weight: 600; color: var(--green-light); background: rgba(30,127,75,.12); padding: .15rem .4rem; border-radius: 99px; white-space: nowrap; }
    .doa-item-chevron { font-size: .8rem; color: var(--text-dim); transition: transform .2s; flex-shrink: 0; }
    .doa-item.expanded .doa-item-chevron { transform: rotate(180deg); }
    .doa-item-body { display: none; margin-top: .875rem; padding-top: .875rem; border-top: 1px solid var(--border); }
    .doa-item.expanded .doa-item-body { display: block; }
    .doa-arabic-text { font-family: 'Amiri', serif; font-size: 1.3rem; color: var(--gold-light); text-align: right; line-height: 2; margin-bottom: .75rem; direction: rtl; }
    .doa-latin-text { font-size: .78rem; color: var(--text-muted); font-style: italic; line-height: 1.7; margin-bottom: .5rem; }
    .doa-terjemahan-text { font-size: .82rem; color: var(--text); line-height: 1.7; margin-bottom: .75rem; }
    .doa-copy-btn { font-size: .75rem; color: var(--green-light); background: rgba(30,127,75,.1); border: 1px solid rgba(30,127,75,.2); border-radius: 8px; padding: .3rem .65rem; cursor: pointer; transition: all .2s; }
    .doa-copy-btn:active { transform: scale(.96); }

    .no-result { text-align: center; color: var(--text-dim); font-size: .875rem; padding: 2rem 1.25rem; }
  </style>
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="apple-touch-icon" href="icon-192.png" />
</head>
<body>
<div class="app">

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="topbar-left">
      <a href="../index.html" class="icon-btn" style="text-decoration:none;" aria-label="Kembali">←</a>
      <span class="topbar-logo">🤲</span>
      <span class="topbar-title">Doa Harian</span>
    </div>
    <div class="topbar-right">
      <button id="dark-mode-toggle" class="icon-btn" aria-label="Toggle tema"><span>🌙</span></button>
    </div>
  </header>

  <div class="page-scroll">
    <div class="page-header">
      <h2 class="page-title">Doa Harian</h2>
      <p class="page-subtitle">Doa-doa ma'tsur dari Al-Qur'an & Hadits</p>
    </div>

    <!-- Search -->
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="doa-search" class="search-input" placeholder="Cari doa..." />
    </div>

    <!-- Category Tabs -->
    <div class="category-tabs" id="cat-tabs"></div>

    <!-- Doa List -->
    <div id="doa-list" class="doa-list"></div>
  </div>
</div>

<div id="toast" class="toast" aria-live="polite"></div>
<script src="../js/shared.js"></script>
<script>
'use strict';

const DOA_DATA = [
  { id: 'd1', name: 'Doa Sebelum Tidur', waktu: 'Sebelum Tidur', arabic: 'بِاسْمِكَ اللَّهُمَّ أَمُوتُ وَأَحْيَا', latin: 'Bismika Allāhumma amūtu wa aḥyā', terjemahan: 'Dengan nama-Mu ya Allah, aku mati dan aku hidup.', kategori: 'Tidur' },
  { id: 'd2', name: 'Doa Bangun Tidur', waktu: 'Setelah Bangun Tidur', arabic: 'الْحَمْدُ لِلَّهِ الَّذِي أَحْيَانَا بَعْدَ مَا أَمَاتَنَا وَإِلَيْهِ النُّشُورُ', latin: 'Alhamdulillāhil-ladzī aḥyānā ba\'da mā amātanā wa ilaihin-nusyūr', terjemahan: 'Segala puji bagi Allah yang telah menghidupkan kami setelah mematikan kami, dan kepada-Nya kami kembali.', kategori: 'Tidur' },
  { id: 'd3', name: 'Doa Masuk Kamar Mandi', waktu: 'Masuk Kamar Mandi', arabic: 'اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنَ الْخُبُثِ وَالْخَبَائِثِ', latin: 'Allāhumma innī a\'ūdzubika minal-khubutsi wal-khabā\'its', terjemahan: 'Ya Allah, sesungguhnya aku berlindung kepada-Mu dari setan laki-laki dan setan perempuan.', kategori: 'Sehari-hari' },
  { id: 'd4', name: 'Doa Keluar Kamar Mandi', waktu: 'Keluar Kamar Mandi', arabic: 'غُفْرَانَكَ', latin: 'Ghufrānaka', terjemahan: '(Aku mengharap) ampunan-Mu.', kategori: 'Sehari-hari' },
  { id: 'd5', name: 'Doa Sebelum Makan', waktu: 'Sebelum Makan', arabic: 'بِسْمِ اللَّهِ وَعَلَى بَرَكَةِ اللَّهِ', latin: 'Bismillāhi wa \'alā barakatillāh', terjemahan: 'Dengan nama Allah dan atas berkah Allah.', kategori: 'Makan' },
  { id: 'd6', name: 'Doa Sesudah Makan', waktu: 'Sesudah Makan', arabic: 'الْحَمْدُ لِلَّهِ الَّذِي أَطْعَمَنَا وَسَقَانَا وَجَعَلَنَا مُسْلِمِينَ', latin: 'Alhamdulillāhil-ladzī ath\'amanā wa saqānā wa ja\'alanā muslimīn', terjemahan: 'Segala puji bagi Allah yang telah memberi kami makan dan minum serta menjadikan kami muslim.', kategori: 'Makan' },
  { id: 'd7', name: 'Doa Masuk Masjid', waktu: 'Masuk Masjid', arabic: 'اللَّهُمَّ افْتَحْ لِي أَبْوَابَ رَحْمَتِكَ', latin: 'Allāhummaftaḥ lī abwāba raḥmatik', terjemahan: 'Ya Allah, bukakanlah untukku pintu-pintu rahmat-Mu.', kategori: 'Masjid' },
  { id: 'd8', name: 'Doa Keluar Masjid', waktu: 'Keluar Masjid', arabic: 'اللَّهُمَّ إِنِّي أَسْأَلُكَ مِنْ فَضْلِكَ', latin: 'Allāhumma innī as\'aluka min faḍlik', terjemahan: 'Ya Allah, sesungguhnya aku memohon kepada-Mu dari karunia-Mu.', kategori: 'Masjid' },
  { id: 'd9', name: 'Doa Keluar Rumah', waktu: 'Keluar Rumah', arabic: 'بِسْمِ اللَّهِ تَوَكَّلْتُ عَلَى اللَّهِ لَا حَوْلَ وَلَا قُوَّةَ إِلَّا بِاللَّهِ', latin: 'Bismillāhi tawakkaltu \'alallāhi, lā ḥaula wa lā quwwata illā billāh', terjemahan: 'Dengan nama Allah, aku bertawakal kepada Allah, tiada daya dan kekuatan kecuali dengan pertolongan Allah.', kategori: 'Perjalanan' },
  { id: 'd10', name: 'Doa Masuk Rumah', waktu: 'Masuk Rumah', arabic: 'اللَّهُمَّ إِنِّي أَسْأَلُكَ خَيْرَ الْمَوْلَجِ وَخَيْرَ الْمَخْرَجِ', latin: 'Allāhumma innī as\'aluka khairul-maulaji wa khairul-makhraj', terjemahan: 'Ya Allah, sesungguhnya aku memohon kepada-Mu kebaikan tempat masuk dan kebaikan tempat keluar.', kategori: 'Perjalanan' },
  { id: 'd11', name: 'Doa Naik Kendaraan', waktu: 'Naik Kendaraan', arabic: 'سُبْحَانَ الَّذِي سَخَّرَ لَنَا هَذَا وَمَا كُنَّا لَهُ مُقْرِنِينَ وَإِنَّا إِلَى رَبِّنَا لَمُنقَلِبُونَ', latin: 'Subḥānal-ladzī sakhkhara lanā hādzā wa mā kunnā lahu muqrinīn, wa innā ilā rabbanā lamunqalibūn', terjemahan: 'Maha Suci Allah yang telah menundukkan semua ini bagi kami, padahal kami sebelumnya tidak mampu menguasainya, dan sesungguhnya kami akan kembali kepada Tuhan kami.', kategori: 'Perjalanan' },
  { id: 'd12', name: 'Doa Memohon Kebaikan', waktu: 'Kapan saja', arabic: 'رَبَّنَا آتِنَا فِي الدُّنْيَا حَسَنَةً وَفِي الْآخِرَةِ حَسَنَةً وَقِنَا عَذَابَ النَّارِ', latin: 'Rabbanā ātinā fid-dunyā ḥasanatan wa fil-ākhirati ḥasanatan wa qinā \'adzāban-nār', terjemahan: 'Ya Tuhan kami, berilah kami kebaikan di dunia dan kebaikan di akhirat, dan lindungilah kami dari azab neraka.', kategori: 'Umum' },
  { id: 'd13', name: 'Doa Memohon Ilmu', waktu: 'Sebelum Belajar', arabic: 'رَبِّ زِدْنِي عِلْمًا وَارْزُقْنِي فَهْمًا', latin: 'Rabbi zidnī \'ilman warzuqnī fahmā', terjemahan: 'Ya Tuhanku, tambahkanlah ilmuku dan berilah aku pemahaman.', kategori: 'Umum' },
  { id: 'd14', name: 'Doa Memohon Kemudahan', waktu: 'Saat Kesulitan', arabic: 'اللَّهُمَّ لَا سَهْلَ إِلَّا مَا جَعَلْتَهُ سَهْلًا وَأَنْتَ تَجْعَلُ الْحَزْنَ سَهْلًا إِذَا شِئْتَ', latin: 'Allāhumma lā sahla illā mā ja\'altahu sahlā, wa anta taj\'alul ḥazna sahlā idzā syi\'ta', terjemahan: 'Ya Allah, tidak ada kemudahan kecuali apa yang Engkau jadikan mudah, dan Engkau menjadikan kesedihan itu mudah jika Engkau menghendaki.', kategori: 'Umum' },
  { id: 'd15', name: 'Doa Saat Marah', waktu: 'Saat Marah', arabic: 'أَعُوذُ بِاللَّهِ مِنَ الشَّيْطَانِ الرَّجِيمِ', latin: 'A\'ūdzu billāhi minasy-syaithānir-rajīm', terjemahan: 'Aku berlindung kepada Allah dari (godaan) setan yang terkutuk.', kategori: 'Sehari-hari' },
  { id: 'd16', name: 'Doa Bercermin', waktu: 'Saat Bercermin', arabic: 'اللَّهُمَّ كَمَا حَسَّنْتَ خَلْقِي فَحَسِّنْ خُلُقِي', latin: 'Allāhumma kamā ḥassanta khalqī faḥassin khuluqī', terjemahan: 'Ya Allah, sebagaimana Engkau telah memperindah wujudku, maka perbaikilah akhlakku.', kategori: 'Sehari-hari' },
  { id: 'd17', name: 'Doa Memohon Rezeki', waktu: 'Pagi hari', arabic: 'اللَّهُمَّ إِنِّي أَسْأَلُكَ رِزْقًا طَيِّبًا وَعِلْمًا نَافِعًا وَعَمَلًا مُتَقَبَّلًا', latin: 'Allāhumma innī as\'aluka rizqan ṭayyiban wa \'ilman nāfi\'an wa \'amalan mutaqabbalan', terjemahan: 'Ya Allah, sesungguhnya aku memohon kepada-Mu rezeki yang baik, ilmu yang bermanfaat, dan amal yang diterima.', kategori: 'Umum' },
  { id: 'd18', name: 'Doa Mohon Ampunan', waktu: 'Kapan saja', arabic: 'رَبَّنَا ظَلَمْنَا أَنفُسَنَا وَإِن لَّمْ تَغْفِرْ لَنَا وَتَرْحَمْنَا لَنَكُونَنَّ مِنَ الْخَاسِرِينَ', latin: 'Rabbanā ẓalamnā anfusanā wa il-lam taghfir lanā wa tarḥamnā lanakūnanna minal-khāsirīn', terjemahan: 'Ya Tuhan kami, kami telah menzalimi diri kami sendiri. Jika Engkau tidak mengampuni kami dan memberi rahmat kepada kami, niscaya kami termasuk orang-orang yang rugi.', kategori: 'Umum' }
];

const CATEGORIES = ['Semua', ...new Set(DOA_DATA.map(d => d.kategori))];

let doaState = { category: 'Semua', search: '', expanded: null };

document.addEventListener('DOMContentLoaded', () => {
  initTheme();
  renderCategoryTabs();
  renderDoa();
  $('doa-search').addEventListener('input', e => { doaState.search = e.target.value; renderDoa(); });
});

function renderCategoryTabs() {
  $('cat-tabs').innerHTML = CATEGORIES.map(c => `
    <button class="cat-btn ${c === doaState.category ? 'active' : ''}" data-cat="${c}">${c}</button>
  `).join('');
  $('cat-tabs').querySelectorAll('.cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      doaState.category = btn.dataset.cat;
      renderDoa();
    });
  });
}

function renderDoa() {
  let list = DOA_DATA;
  if (doaState.category !== 'Semua') list = list.filter(d => d.kategori === doaState.category);
  if (doaState.search.trim()) {
    const q = doaState.search.toLowerCase();
    list = list.filter(d => d.name.toLowerCase().includes(q) || d.terjemahan.toLowerCase().includes(q) || d.waktu.toLowerCase().includes(q));
  }

  if (!list.length) { $('doa-list').innerHTML = '<div class="no-result">Tidak ada doa ditemukan 🤲</div>'; return; }

  $('doa-list').innerHTML = list.map(d => {
    const isExp = doaState.expanded === d.id;
    return `
      <div class="doa-item ${isExp ? 'expanded' : ''}" data-id="${d.id}">
        <div class="doa-item-header">
          <div class="doa-item-title">${d.name}</div>
          <span class="doa-item-waktu">${d.waktu}</span>
          <span class="doa-item-chevron">▼</span>
        </div>
        <div class="doa-item-body">
          <div class="doa-arabic-text">${d.arabic}</div>
          <div class="doa-latin-text">${d.latin}</div>
          <div class="doa-terjemahan-text">${d.terjemahan}</div>
          <button class="doa-copy-btn" data-id="${d.id}">📋 Salin</button>
        </div>
      </div>`;
  }).join('');

  $('doa-list').querySelectorAll('.doa-item').forEach(el => {
    el.addEventListener('click', e => {
      if (e.target.classList.contains('doa-copy-btn')) return;
      const id = el.dataset.id;
      doaState.expanded = doaState.expanded === id ? null : id;
      renderDoa();
    });
  });

  $('doa-list').querySelectorAll('.doa-copy-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const d = DOA_DATA.find(x => x.id === btn.dataset.id);
      if (d) navigator.clipboard?.writeText(`${d.arabic}\n\n${d.latin}\n\n${d.terjemahan}`);
      showToast('Doa disalin 📋');
    });
  });
}
</script>
</body>
</html>
