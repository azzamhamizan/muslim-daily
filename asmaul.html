    .page-scroll { flex: 1; overflow-y: auto; padding-bottom: 1rem; }

    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold-light)); border-radius: 99px; transition: width .5s ease; width: 0%; }

    .search-wrap { position: relative; padding: .5rem 1.25rem .5rem; }
    .search-input { width: 100%; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: .65rem 1rem .65rem 2.6rem; font-size: .875rem; color: var(--text); outline: none; font-family: inherit; transition: border-color .2s; }

    .search-icon { position: absolute; left: 2.25rem; top: 50%; transform: translateY(-50%); font-size: 1rem; pointer-events: none; }

    .asmaul-list { display: grid; grid-template-columns: 1fr 1fr; gap: .5rem; padding: .25rem 1.25rem 2rem; }
    .asmaul-item { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: .875rem; cursor: pointer; transition: all .2s; text-align: center; position: relative; }
    .asmaul-item.memorized { background: rgba(201,168,76,.08); border-color: rgba(201,168,76,.3); }
    .asmaul-item:active { transform: scale(.96); }
    .asmaul-num { font-size: .62rem; color: var(--text-dim); font-weight: 600; position: absolute; top: .5rem; left: .6rem; }
    .asmaul-check { position: absolute; top: .5rem; right: .6rem; font-size: .7rem; color: var(--gold); opacity: 0; transition: opacity .2s; }
    .asmaul-item.memorized .asmaul-check { opacity: 1; }
    .asmaul-arabic { font-family: 'Amiri', serif; font-size: 1.3rem; color: var(--gold-light); display: block; margin: .3rem 0 .25rem; }
    .asmaul-latin { font-size: .7rem; font-weight: 700; color: var(--text-muted); display: block; margin-bottom: .15rem; }
    .asmaul-arti { font-size: .68rem; color: var(--text-dim); display: block; line-height: 1.4; }

let asmaSearch = '';

document.addEventListener('DOMContentLoaded', () => {
  initTheme();
  renderAsmaul();
  $('asmaul-search').addEventListener('input', e => { asmaSearch = e.target.value; renderAsmaul(); });
});

function getMemorized() { return JSON.parse(localStorage.getItem('md-asmaul-memorized') || '[]'); }

function renderAsmaul() {
  const memorized = getMemorized();
  let list = ASMAUL;
  if (asmaSearch.trim()) {
    const q = asmaSearch.toLowerCase();
    list = list.filter(a => a.latin.toLowerCase().includes(q) || a.arti.toLowerCase().includes(q) || String(a.num).includes(q));
  }

  $('asmaul-list').innerHTML = list.map(a => {
    const isMem = memorized.includes(a.num);
    return `<div class="asmaul-item ${isMem ? 'memorized' : ''}" data-num="${a.num}">
      <span class="asmaul-num">${a.num}</span>
      <span class="asmaul-check">✓</span>
      <span class="asmaul-arabic">${a.arabic}</span>
      <span class="asmaul-latin">${a.latin}</span>
      <span class="asmaul-arti">${a.arti}</span>
    </div>`;
  }).join('');

  $('asmaul-list').querySelectorAll('.asmaul-item').forEach(el => {
    el.addEventListener('click', () => {
      const num = parseInt(el.dataset.num);
      const mem = getMemorized();
      const idx = mem.indexOf(num);
      if (idx === -1) { mem.push(num); showToast(`${ASMAUL[num - 1].latin} — dihafal ✓`); }
      else { mem.splice(idx, 1); showToast('Tanda hafal dihapus'); }
      localStorage.setItem('md-asmaul-memorized', JSON.stringify(mem));
      renderAsmaul();
      if (mem.length === 99) showToast('🌟 MasyaAllah! Semua 99 Asmaul Husna dihafal!', 4000);
    });
  });

  const count = memorized.length;
  $('asmaul-progress-bar').style.width = `${(count / 99) * 100}%`;
  $('asmaul-progress-text').textContent = `${count} / 99 dihafal`;
}
</script>
